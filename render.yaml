services:
  - type: web
    name: monitor-tropical
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.12.8
